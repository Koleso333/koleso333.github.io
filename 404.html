<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>404 — Koleso Dev</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet" href="/style.css">
    <link rel="icon" href="/icon.ico" type="image/x-icon">

    <style>
        .error-page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 24px 16px;
        }

        .error-page .hero {
            height: calc(var(--hero-square) * 2);
        }

        .error-message {
            margin-top: 32px;
            font-family: "Mitr", "Roboto", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            font-weight: 400;
            font-size: 20px;
            color: #d0d0d0;
        }
    </style>
</head>
<body>

<main class="error-page">
    <div class="hero">
        <div class="hero-square hero-square--left"></div>
        <div class="hero-square hero-square--right"></div>
        <h1 class="hero-title">404</h1>
    </div>

    <p class="error-message">Упс. Походу этой страницы тут нет</p>
</main>

<script src="/hero.js"></script>
</body>
</html>
